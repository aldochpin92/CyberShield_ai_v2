<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CyberShield AI "El Guardian!🛡️"</title>
    <style>
        body { 
            background-color: #010816; /* Deep Midnight Blue */
            color: #0055ff; /* ROYAL NEON BLUE */
            font-family: 'Courier New', monospace;
            display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;
        }
        .terminal {
            width: 90%; max-width: 850px; background: #020c1f; border: 2px solid #0055ff;
            padding: 40px; border-radius: 12px; box-shadow: 0 0 50px rgba(0, 85, 255, 0.5);
        }
        .header { border-bottom: 2px solid #0055ff; padding-bottom: 15px; margin-bottom: 25px; }
        .glitch { font-size: 1.8rem; font-weight: bold; letter-spacing: 2px; color: #fff; text-shadow: 0 0 15px #0055ff; }
        .info { line-height: 1.8; font-size: 1.1rem; color: #a3c4ff; }
        .status-tag { color: #fff; background: #0055ff; padding: 3px 10px; border-radius: 4px; font-weight: bold; box-shadow: 0 0 15px #0055ff; }
        
        /* THE INPUT AREA */
        .shield-input-container { display: flex; gap: 15px; margin-top: 30px; }
        input { 
            flex: 1; background: #010a1a; border: 1px solid #0055ff; color: #fff; 
            padding: 15px; font-family: 'Courier New', monospace; font-size: 1.1rem; outline: none;
            box-shadow: inset 0 0 10px rgba(0, 85, 255, 0.2);
        }
        button { 
            background: #0055ff; color: #fff; border: none; padding: 15px 30px; 
            cursor: pointer; font-weight: bold; font-family: 'Courier New', monospace; 
            text-transform: uppercase; transition: 0.3s; box-shadow: 0 0 10px #0055ff;
        }
        button:hover { background: #fff; color: #0055ff; box-shadow: 0 0 25px #fff; }

        /* THE OUTPUT AREA */
        #responseArea { 
            margin-top: 30px; border-left: 4px solid #0055ff; padding-left: 20px; 
            color: #d1e3ff; min-height: 80px; font-style: italic; font-size: 1.1rem;
            white-space: pre-wrap; text-shadow: 0 0 5px rgba(0, 85, 255, 0.3);
        }
        .footer { margin-top: 40px; font-size: 0.8rem; color: #2c4a85; text-align: right; }
    </style>
</head>
<body>
    <div class="terminal">
        <div class="header">
            <div class="glitch">CyberShield AI "El Guardian!🛡️"</div>
        </div>
        <div class="info">
            <p>> AGENT IDENTIFIED: <strong>{{ agent }}</strong></p>
            <p>> SYSTEM STATUS: <span class="status-tag">{{ status }}</span></p>
            <p>> PRIMARY MISSION: <strong>{{ mission }}</strong></p>
        </div>

        <div class="shield-input-container">
            <input type="text" id="userQuery" placeholder="Enter ShieldQuery (Link or Message)...">
            <button onclick="askGuardian()">SHIELD ACTIVATE</button>
        </div>

        <div id="responseArea">> SYSTEM IDLE. AWAITING SHIELDQUERY...</div>

        <div class="footer">
            Latin Passion, Cyber Strength. CyberShield AI (El Guardián) 🛡️
        </div>
    </div>

    <script>
        async function askGuardian() {
            const query = document.getElementById('userQuery').value;
            const display = document.getElementById('responseArea');
            if(!query) return;

            display.innerHTML = "> ANALYZING THREAT... 🛡️";
            
            try {
                const response = await fetch(`/analyze?query=${encodeURIComponent(query)}`);
                const data = await response.json();
                display.innerText = data.analysis;
            } catch (error) {
                display.innerText = "> ERROR: CONNECTION TO SECURITY BRIDGE LOST.";
            }
        }
        document.getElementById("userQuery").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                askGuardian();
            }
        });
    </script>
</body>
</html>
