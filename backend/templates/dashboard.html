<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CyberShield AI "El Guardián" - Eagle Protocol</title>
    <style>
        body {
            background-color: #010816;
            color: #0055ff;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        .terminal {
            width: 95%;
            max-width: 850px;
            background: #020c1f;
            border: 2px solid #0055ff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 0 50px rgba(0, 85, 255, 0.5);
            margin: 20px;
            position: relative;
        }

        .logo-container {
            text-align: center;
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
            filter: drop-shadow(0 0 15px rgba(0, 85, 255, 1));
        }

        .eye-wrapper {
            position: relative;
            width: 250px;
            height: 150px;
            overflow: hidden;
            background: #010816;
            clip-path: path('M 10 80 C 40 25, 140 15, 240 55 C 190 150, 65 150, 10 80');
        }

        .logo-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            transform: scale(0.85);
            filter: drop-shadow(0 0 8px #0055ff);
        }

        .eyelid {
            position: absolute;
            left: 0;
            width: 100%;
            height: 55%;
            background: #010816;
            z-index: 10;
            transition: all 0.1s ease-in-out;
        }

        .eyelid.top {
            top: 0;
            border-bottom: 3px solid #0055ff;
            transform: translateY(-100%);
        }

        .eyelid.bottom {
            bottom: 0;
            border-top: 3px solid #0055ff;
            transform: translateY(100%);
        }

        @keyframes blink {
            0%, 90%, 100% { transform: translateY(-100%); }
            94%, 96% { transform: translateY(0%); }
        }

        @keyframes blink-bottom {
            0%, 90%, 100% { transform: translateY(100%); }
            94%, 96% { transform: translateY(0%); }
        }

        .eye-wrapper.idle .eyelid.top { animation: blink 5s infinite; }
        .eye-wrapper.idle .eyelid.bottom { animation: blink-bottom 5s infinite; }

        .eye-wrapper.scanning .eyelid.top {
            transform: translateY(-15%);
            animation: none;
        }

        .eye-wrapper.scanning .eyelid.bottom {
            transform: translateY(15%);
            animation: none;
        }

        .header {
            border-bottom: 2px solid #0055ff;
            padding-bottom: 15px;
            margin-bottom: 25px;
            text-align: center;
        }

        .glitch {
            font-size: 1.8rem;
            font-weight: bold;
            letter-spacing: 2px;
            color: #fff;
            text-shadow: 0 0 15px #0055ff;
        }

        .info {
            line-height: 1.8;
            font-size: 1.1rem;
            color: #a3c4ff;
        }

        .status-tag {
            color: #fff;
            background: #0055ff;
            padding: 3px 10px;
            border-radius: 4px;
            font-weight: bold;
            box-shadow: 0 0 15px #0055ff;
        }

        .eagle-icon {
            display: inline-block;
            width: 26px;
            height: 26px;
            background-image: url('/static/eagle.png?v=2');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            filter: invert(1) sepia(1) saturate(500%) hue-rotate(180deg) brightness(1.2) drop-shadow(0 0 5px #0055ff);
            mix-blend-mode: screen;
            vertical-align: middle;
            margin-right: 12px;
            flex-shrink: 0;
        }

        .shield-input-container {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        input {
            flex: 1;
            background: #010a1a;
            border: 1px solid #0055ff;
            color: #fff;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 1.05rem;
            outline: none;
        }

        button {
            background: #0055ff;
            color: #fff;
            border: none;
            padding: 15px 30px;
            cursor: pointer;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            text-transform: uppercase;
            transition: 0.3s;
        }

        button:hover {
            background: #fff;
            color: #0055ff;
            box-shadow: 0 0 25px #fff;
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        #responseArea {
            margin-top: 30px;
            border-left: 4px solid #0055ff;
            padding-left: 20px;
            color: #d1e3ff;
            min-height: 120px;
            font-size: 1.05rem;
            white-space: pre-wrap;
            line-height: 1.6;
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }

        #responseText {
            margin-top: 2px;
            flex: 1;
        }

        .footer {
            margin-top: 50px;
            font-size: 1rem;
            color: #ffffff;
            font-weight: bold;
            text-align: right;
            letter-spacing: 1px;
            text-shadow: 0 0 10px #0055ff, 0 0 20px #0055ff, 0 0 30px #0055ff;
        }

        .cursor {
            display: inline-block;
            width: 10px;
            animation: pulse 0.8s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="terminal">
        <div class="logo-container">
            <div class="eye-wrapper idle" id="eyeControl">
                <div class="eyelid top"></div>
                <img src="/static/cbsdailogo.png?v=2" alt="CyberShield Logo" class="logo-img">
                <div class="eyelid bottom"></div>
            </div>
        </div>

        <div class="header">
            <div class="glitch">{{ agent }}</div>
        </div>

        <div class="info">
            <p><i class="eagle-icon"></i> AGENT: <strong>{{ agent }}</strong></p>
            <p><i class="eagle-icon"></i> STATUS: <span class="status-tag">{{ status }}</span></p>
            <p><i class="eagle-icon"></i> MISSION: <strong>{{ mission }}</strong></p>
        </div>

        <div class="shield-input-container">
            <input type="text" id="userQuery" placeholder="Paste a suspicious link, message, or question...">
            <button id="shieldButton" onclick="askGuardian()">SHIELD ACTIVATE</button>
        </div>

        <div id="responseArea">
            <i class="eagle-icon"></i>
            <span id="responseText">See something suspicious? Paste it here.</span>
        </div>

        <div class="footer">
            Latin Passion, Cyber Strength. CyberShield AI (El Guardián)
        </div>
    </div>

    <script>
        const inputEl = document.getElementById('userQuery');
        const responseTextEl = document.getElementById('responseText');
        const eyeEl = document.getElementById('eyeControl');
        const buttonEl = document.getElementById('shieldButton');

        function cleanResponse(text) {
            if (!text) return "";

            let cleaned = text.trim();

            const signaturePatterns = [
                /Latin Passion, Cyber Strength\. CyberShield AI.*$/gis,
                /CyberShield AI \(El Guardián\).*$/gis
            ];

            signaturePatterns.forEach(pattern => {
                cleaned = cleaned.replace(pattern, '').trim();
            });

            cleaned = cleaned.replace(/\n{3,}/g, '\n\n');
            return cleaned;
        }

        async function typeMessage(text, speed = 10) {
            responseTextEl.textContent = "";
            for (let i = 0; i < text.length; i++) {
                responseTextEl.textContent += text.charAt(i);
                await new Promise(resolve => setTimeout(resolve, speed));
            }
        }

        async function askGuardian() {
            const query = inputEl.value.trim();
            if (!query) return;

            buttonEl.disabled = true;
            eyeEl.classList.remove('idle');
            eyeEl.classList.add('scanning');

            responseTextEl.innerHTML = 'El Guardián is analyzing<span class="cursor">|</span>';

            try {
                const response = await fetch('/analyze', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ query })
                });

                const data = await response.json();
                const cleaned = cleanResponse(data.analysis || "No analysis returned.");

                await typeMessage(cleaned);
                inputEl.value = "";
            } catch (error) {
                responseTextEl.textContent = "I lost the connection for a moment. Please try again.";
            } finally {
                buttonEl.disabled = false;
                inputEl.focus();

                setTimeout(() => {
                    eyeEl.classList.remove('scanning');
                    eyeEl.classList.add('idle');
                }, 1200);
            }
        }

        inputEl.addEventListener("keypress", (e) => {
            if (e.key === "Enter") askGuardian();
        });
    </script>
</body>
</html>
